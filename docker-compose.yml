# Docker Compose 配置

version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:14-alpine
    container_name: compliance-db
    environment:
      POSTGRES_USER: compliance
      POSTGRES_PASSWORD: ${DB_PASSWORD:-compliance123}
      POSTGRES_DB: compliance_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compliance"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Compliance Hub 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: compliance-app
    environment:
      DATABASE_URL: postgresql://compliance:${DB_PASSWORD:-compliance123}@db:5432/compliance_hub
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      LOG_FORMAT: json
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
