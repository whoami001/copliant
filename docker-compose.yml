# Docker Compose 配置

version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:14-alpine
    container_name: compliance-db
    environment:
      POSTGRES_USER: ${DB_USER:-compliance}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-compliance123}
      POSTGRES_DB: ${DB_NAME:-compliance_hub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-compliance}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - compliance-net

  # Compliance Hub 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: compliance-app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-compliance}:${DB_PASSWORD:-compliance123}@db:5432/${DB_NAME:-compliance_hub}
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - compliance-net

volumes:
  postgres_data:

networks:
  compliance-net:
    driver: bridge
